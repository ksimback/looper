name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.13"]
        include:
          - { os: ubuntu-latest, python-version: "3.10" }
          - { os: ubuntu-latest, python-version: "3.11" }
          - { os: ubuntu-latest, python-version: "3.12" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python -m pip install "PyYAML>=6.0"
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Compile example loop (smoke test)
        shell: bash
        run: |
          out="$(mktemp -d)"
          python scripts/looper.py compile examples/ai-workflow-mapping/loop.yaml \
            --out "$out/loop.resolved.json" \
            --render "$out/LOOP.md" \
            --session-prompt "$out/RUN_IN_SESSION.md"
          test -s "$out/loop.resolved.json"
          test -s "$out/LOOP.md"
          test -s "$out/RUN_IN_SESSION.md"
